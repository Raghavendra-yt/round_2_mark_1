server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;

    # Secure Headers - Tightened CSP (Removed unsafe-inline from scripts)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://apis.google.com https://translate.google.com https://translate.googleapis.com https://maps.googleapis.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://translate.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://maps.gstatic.com https://maps.googleapis.com https://www.gstatic.com; connect-src 'self' https://firestore.googleapis.com https://api.open-meteo.com https://nominatim.openstreetmap.org https://region1.google-analytics.com https://www.googleapis.com;" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # CORS (If hosting backend APIs)
    add_header Access-Control-Allow-Origin "https://elected-app.run.app" always;

    # gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
