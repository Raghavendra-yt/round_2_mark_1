steps:
  # 1. Install Dependencies
  - name: 'node:20'
    entrypoint: npm
    args: ['ci']

  # 2. Run Linting (ESLint + Prettier)
  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'lint']

  # 3. Run Unit Tests (Jest) & Coverage
  - name: 'node:20'
    entrypoint: npm
    args: ['run', 'test']
    env:
      - 'CI=true'

  # 4. Build Docker Image (Implicitly builds the Vite/React App)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/elected-app:$COMMIT_SHA', '.']

  # 5. Run Security Scan on Docker Image
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud artifacts docker images scan gcr.io/$PROJECT_ID/elected-app:$COMMIT_SHA \
        --format="value(response.scan)" > scan_id.txt

  # 6. Push Docker Image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/elected-app:$COMMIT_SHA']

  # 7. Deploy to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'elected-app'
      - '--image'
      - 'gcr.io/$PROJECT_ID/elected-app:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NODE_ENV=production'

images:
  - 'gcr.io/$PROJECT_ID/elected-app:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
